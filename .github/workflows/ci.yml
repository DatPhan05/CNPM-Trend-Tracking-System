name: Basic CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - task-1.5-ci-cd-database
  pull_request:
    branches:
      - main
      - develop

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run test
        run: npm test

      - name: Run build
        run: npm run build