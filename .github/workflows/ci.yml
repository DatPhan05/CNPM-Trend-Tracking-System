name: Basic CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  basic-check:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://admin:admin123@localhost:5432/scientific_trend_db
      JWT_SECRET: trendscholar_secret_key
      PORT: 8080

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run test
        run: npm test

      - name: Run build
        run: npm run build