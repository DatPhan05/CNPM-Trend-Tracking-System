# --------------------------------------------------------------------------
# NGINX site configuration for the Scientific Trend Tracking System.
#
# This config does two things:
#   1. Proxies /api/* and /api-docs to the Express.js backend (port 8080)
#   2. Serves React static files for all other routes (SPA fallback)
# --------------------------------------------------------------------------

upstream backend_server {
    server backend:8080;
}

server {
    listen 80;
    server_name localhost;

    # ---- React static files (served by NGINX directly) ----
    root /usr/share/nginx/html;
    index index.html;

    # ---- Proxy API requests to Express.js backend ----
    location /api/ {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Proxy Swagger docs ----
    location /api-docs {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- React SPA fallback ----
    # All non-API, non-file routes fall back to index.html
    # so that React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
